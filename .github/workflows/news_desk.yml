name: News Desk

on:
  issues:
    types: [opened]

  workflow_dispatch:
    inputs:
      rebuild_tag:
        description: '再構築するタグ名 (ALL で全モジュール)'
        required: false
        default: 'ALL'

  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  syndicate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ▼ rebuild_tag を安全に決定（イベントごとの差を吸収）
      - name: Resolve rebuild tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "REBUILD_TAG=${{ github.event.inputs.rebuild_tag }}" >> $GITHUB_ENV
          else
            echo "REBUILD_TAG=ALL" >> $GITHUB_ENV
          fi

      - name: [Content] Run Editor Script
        env:
          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          REBUILD_TAG: ${{ env.REBUILD_TAG }}
        run: python scripts/editor.py

      - name: [Publish] Run Publisher Script
        run: python scripts/publisher.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Syndicate-Bot"
          git config --global user.email "bot@example.com"

          git add articles/ contexts/ docs/

          git commit -m "📰 Syndicate: Content Edited & Published" || echo "No changes to commit"

          git push
