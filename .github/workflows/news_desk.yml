name: News Desk

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Editor Script
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/editor.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Syndicate-Bot"
          git config --global user.email "bot@example.com"
          git add articles/ contexts/
          git commit -m "📰 Auto-publish: Updated articles and 2000-char context" || echo "No changes to commit"
          git push
