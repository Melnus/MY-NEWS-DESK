name: News Desk

on:
  issues:
    types: [opened]
  # ▼ 追加：手動で再生成コマンドを実行できるようにする
  workflow_dispatch:
    inputs:
      rebuild_tag:
        description: '再構築するタグ名 (ALL で全モジュール)'
        required: true
        default: 'ALL'
  # ▼ 追加：毎日0時に自動巡回（パトロール）
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  syndicate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: [Content] Run Editor Script
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REBUILD_TAG: ${{ github.event.inputs.rebuild_tag }}
        run: python scripts/editor.py

      # ▼ 追加：配信用のPublisherを実行する
      - name: [Publish] Run Publisher Script
        run: python scripts/publisher.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Syndicate-Bot"
          git config --global user.email "bot@example.com"
          # ▼ 修正：docs フォルダ（Webサイト用）も一緒に保存するようにする
          git add articles/ contexts/ docs/
          git commit -m "📰 Syndicate: Content Edited & Published" || echo "No changes to commit"
          git push
